name: Update AllowedIPs from RoscomVPN GeoIP

on:
  schedule:
    # Каждый день в 6:00 UTC
    - cron: '0 6 * * *'
  # Возможность запустить вручную
  workflow_dispatch:

jobs:
  update-allowed-ips:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Checkout RoscomVPN GeoIP repository
        uses: actions/checkout@v4
        with:
          repository: hydraponique/roscomvpn-geoip
          path: roscomvpn-geoip
          sparse-checkout: |
            release/text

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cidr-tools
        run: npm install cidr-tools

      - name: Process and merge IP ranges
        run: node .github/workflows/scripts/process-ips.js

      - name: Commit and push changes
        run: |
          git config user.name "selectee"
          git config user.email "selectee@users.noreply.github.com"
          
          if git diff --quiet AllowedIPs.txt; then
            echo "Нет изменений"
          else
            git add AllowedIPs.txt
            git commit -m "Update AllowedIPs from RoscomVPN GeoIP [automated]"
            git push
